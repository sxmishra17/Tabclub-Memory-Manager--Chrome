<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420">
  <title>TabClub Memory Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ─── Header ─────────────────────────────────────────── -->
  <header id="popup-header">
    <div class="header-brand">
      <img src="../icons/icon-32.png" alt="TabClub" class="header-icon" id="header-icon">
      <div>
        <div class="header-title-row">
          <h1 id="header-title">TabClub Memory Manager</h1>
          <span class="header-powered">
            <span class="powered-text">powered by</span>
            <img src="../icons/yuvatech_logo.png" alt="YuvaTech" class="powered-logo" id="powered-logo">
            <span class="powered-name">YuvaTech</span>
          </span>
        </div>
        <p class="header-subtitle" id="header-subtitle">Loading...</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="btn-settings" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── Memory Stats Bar ───────────────────────────────── -->
  <section id="memory-bar">
    <div class="memory-stats" id="memory-stats">
      <div class="stat">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-value stat-active" id="stat-active">0</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat">
        <span class="stat-value stat-discarded" id="stat-discarded">0</span>
        <span class="stat-label">Sleeping</span>
      </div>
      <div class="stat">
        <span class="stat-value stat-saved" id="stat-saved">0 MB</span>
        <span class="stat-label">Saved</span>
      </div>
    </div>

    <!-- Chrome Memory Usage Bar -->
    <div class="memory-usage" id="memory-usage">
      <div class="memory-usage-header">
        <span class="memory-usage-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
          </svg>
          Est. Chrome Memory
        </span>
        <span class="memory-usage-value" id="memory-usage-value">— MB</span>
      </div>
      <div class="memory-bar-track">
        <div class="memory-bar-fill" id="memory-bar-fill" style="width: 0%"></div>
        <div class="memory-bar-saved" id="memory-bar-saved" style="width: 0%"></div>
      </div>
      <div class="memory-bar-legend">
        <span class="legend-item legend-active"><span class="legend-dot"></span>Active</span>
        <span class="legend-item legend-saved"><span class="legend-dot"></span>Saved by Club</span>
      </div>
    </div>

    <button id="btn-discard-all" class="btn-discard-all" title="Free memory from all inactive tabs">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
        <line x1="12" y1="2" x2="12" y2="12"></line>
      </svg>
      Free All Memory
    </button>
  </section>

  <!-- ─── Clubs List ─────────────────────────────────────── -->
  <main id="clubs-container">
    <div id="clubs-list" class="clubs-list">
      <!-- Clubs rendered dynamically -->
    </div>
    <div id="empty-state" class="empty-state" style="display:none">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
        <rect x="3" y="3" width="18" height="18" rx="3"></rect>
        <path d="M3 9h18"></path>
        <path d="M9 3v6"></path>
      </svg>
      <p>No tabs to club yet.</p>
      <p class="empty-hint">Open some websites to see them grouped!</p>
    </div>
  </main>

  <!-- ─── Saved Groups ───────────────────────────────────── -->
  <section id="saved-section" class="saved-section" style="display:none">
    <div class="saved-header" id="saved-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
        <polyline points="17 21 17 13 7 13 7 21"></polyline>
        <polyline points="7 3 7 8 15 8"></polyline>
      </svg>
      <span>Saved Groups</span>
      <span class="saved-count" id="saved-count">0</span>
      <svg class="saved-chevron" id="saved-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </div>
    <div class="saved-list" id="saved-list">
      <!-- Saved group cards rendered dynamically -->
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
